<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 44">
  <defs>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: rounded square -->
  <rect x="0" y="2" width="40" height="40" rx="9" fill="url(#icon-bg)"/>

  <!-- V mark -->
  <path d="M8 13L20 31L32 13"
        fill="none"
        stroke="white"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Flame dot -->
  <ellipse cx="20" cy="36" rx="3" ry="3.5" fill="white" opacity="0.6"/>

  <!-- Wordmark: "Vuka" -->
  <text x="50" y="20"
        font-family="'Geist', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="18"
        letter-spacing="-0.5"
        fill="#0f172a">Vuka</text>

  <!-- Wordmark: "Career" in orange gradient -->
  <text x="95" y="20"
        font-family="'Geist', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="18"
        letter-spacing="-0.5"
        fill="url(#text-grad)">Career</text>

  <!-- Wordmark: "Hub" -->
  <text x="161" y="20"
        font-family="'Geist', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="18"
        letter-spacing="-0.5"
        fill="#0f172a">Hub</text>

  <!-- Tagline -->
  <text x="50" y="35"
        font-family="'Geist', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="9"
        letter-spacing="2"
        fill="#64748b">YOUR POST-MATRIC GUIDE · SA</text>
</svg>
